name: Build Magisk APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Setup NDK
      run: python build.py ndk
    
    - name: Build release
      run: python build.py -r all
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: magisk-whitelist-apk
        path: |
          out/app-release.apk
          out/app-debug.apk
        if-no-files-found: warn
    
    - name: Upload all outputs
      uses: actions/upload-artifact@v4
      with:
        name: magisk-all-outputs
        path: out/
        if-no-files-found: warn
